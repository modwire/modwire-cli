name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    uses: modwire/modwire-architecture/.github/workflows/python-package.yml@workflows-v1
    with:
      python-versions: '["3.12", "3.13", "3.14"]'
      build-python-version: "3.12"
